name: Code Quality & Build Verification (CI)

on:
  push:
    branches:
      - main
      - master
      - development
  pull_request:
    branches:
      - main
      - master
      - development

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript validation
        run: npx tsc --noEmit

      - name: Verify production build compilation
        run: npm run build
        env:
          MONGODB_URI: "mongodb://localhost:27017/dummy"
          NEXTAUTH_SECRET: "dummy_secret_for_ci_build_verification_only"
          NEXTAUTH_URL: "http://localhost:3000"
